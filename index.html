<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrainMore Tracker</title>
<style>
  html, body { height: 100%; margin: 0; background: #131316; }
  :root{
    --bg: #131316;
    --card: #1b1b1f;
    --card-line: #2c2c31;
    --ink: #eeeeec;
    --dim: #8d8d94;
    --accent: #ef4b36;
    --accent-dim: #3a2320;
    --accent-secondary: #8a3a30;
    --idle: #35353b;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Helvetica Neue", Arial, sans-serif;
    padding-bottom:60px;
  }
  header{
    padding:24px 16px 14px;
    border-bottom:1px solid var(--card-line);
  }
  .eyebrow{
    font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--accent); font-weight:700; margin-bottom:6px;
  }
  h1{ font-size:24px; font-weight:800; letter-spacing:-0.01em; }
  .day-toggle{
    display:flex;
    margin:16px 16px 0;
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:10px;
    overflow:hidden;
  }
  .day-btn{
    flex:1;
    min-height:44px;
    padding:14px 0;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:13px;
    font-weight:700;
    color:var(--dim);
    background:none;
    border:none;
  }
  .day-btn.active{ background:var(--accent-dim); color:var(--accent); }
  .list{ padding:14px 16px 0; display:flex; flex-direction:column; gap:10px; }
  .section-head{ padding:22px 16px 0; }
  .section-head h2{ font-size:12px; letter-spacing:0.1em; text-transform:uppercase; font-weight:800; color:var(--dim); }
  .section-head p{ font-size:11.5px; color:var(--dim); margin-top:4px; line-height:1.4; }

  .ex-card{
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:10px;
    padding:10px 12px;
  }
  .thumb{
    width:52px; height:52px;
    border-radius:8px;
    background:#0f0f11;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .thumb svg{ width:34px; height:auto; }
  .ex-info{ flex:1; min-width:0; }
  .ex-name{ font-size:14.5px; font-weight:700; }
  .ex-equip{ font-size:11px; color:var(--dim); margin-top:1px; }
  .ex-badges{ display:flex; gap:6px; margin-top:5px; flex-wrap:wrap; }
  .pill{
    font-size:10px;
    background:#26262b;
    color:var(--dim);
    padding:2px 7px;
    border-radius:20px;
  }
  .pill.last{ background:var(--accent-dim); color:var(--accent); }
  .chevron{ color:var(--dim); font-size:18px; }

  /* detail page */
  #detailView{ display:none; }
  .detail-head{
    display:flex; align-items:center; gap:10px;
    padding:18px 16px 12px;
    border-bottom:1px solid var(--card-line);
  }
  .back-btn, .info-btn{
    width:32px; height:32px;
    border-radius:50%;
    border:1px solid var(--card-line);
    background:none;
    color:var(--ink);
    font-size:16px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .detail-title{ flex:1; min-width:0; }
  .detail-title .ex-name{ font-size:17px; }
  .detail-title .ex-equip{ font-size:12px; }

  .sets-card{
    margin:14px 16px 0;
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:10px;
    overflow:hidden;
  }
  .set-row{
    display:flex; align-items:center; gap:8px;
    padding:12px 14px;
    border-bottom:1px solid var(--card-line);
  }
  .set-num{ font-size:13px; color:var(--dim); width:16px; }
  .field-group{ display:flex; flex-direction:column; }
  .field-label{ font-size:9px; color:var(--dim); text-transform:uppercase; margin-bottom:3px; letter-spacing:0.06em; }
  .field{
    display:flex; align-items:center;
    background:#0f0f11;
    border-radius:6px;
    border:1px solid var(--card-line);
  }
  .stepper-btn{ width:30px; height:30px; background:none; border:none; color:var(--ink); font-size:17px; font-weight:700; }
  .field input{
    width:44px; text-align:center; background:none; border:none;
    color:var(--ink); font-size:14.5px; font-weight:700;
  }
  .field input::-webkit-outer-spin-button, .field input::-webkit-inner-spin-button{ -webkit-appearance:none; }
  .del-set{ margin-left:auto; color:var(--dim); background:none; border:none; font-size:18px; padding:4px 6px; }
  .add-set{ width:100%; padding:12px; background:none; border:none; color:var(--accent); font-size:13px; font-weight:700; }
  .save-btn{
    width:calc(100% - 32px);
    margin:12px 16px 4px;
    padding:14px; background:var(--accent); border:none; border-radius:8px;
    color:#fff; font-size:14px; font-weight:700;
  }
  .save-confirm{
    text-align:center; font-size:12px; color:var(--dim); padding:6px 16px 4px; min-height:18px;
  }

  /* modal */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.6);
    display:none; align-items:flex-end; z-index:20;
  }
  .overlay.open{ display:flex; }
  .modal{
    background:var(--card); width:100%; border-radius:16px 16px 0 0;
    max-height:82vh; overflow-y:auto; padding-bottom:24px;
  }
  .modal-handle-zone{ padding:14px 0 10px; display:flex; justify-content:center; }
  .modal-handle{
    width:36px; height:4px; border-radius:2px; background:#3a3a40;
  }
  .modal-head{ display:flex; justify-content:space-between; align-items:center; padding:18px 16px 8px; }
  .modal-head h2{ font-size:17px; font-weight:800; }
  .close-btn{ width:30px; height:30px; border-radius:50%; border:none; background:#26262b; color:var(--ink); font-size:16px; }
  .tabs{ display:flex; border-bottom:1px solid var(--card-line); padding:0 16px; }
  .tab{ flex:1; text-align:center; padding:10px 0; font-size:13px; color:var(--dim); font-weight:600; border-bottom:2px solid transparent; }
  .tab.active{ color:var(--accent); border-color:var(--accent); }
  .tab-body{ position:relative; overflow:hidden; transition:height .28s cubic-bezier(.4,0,.2,1); }
  .tab-panel{ display:none; padding:16px; }
  .tab-panel.active{ display:block; }
  .tab-panel p{ font-size:13px; color:var(--dim); line-height:1.5; margin-bottom:10px; }

  .figures{ display:flex; justify-content:center; gap:14px; margin-bottom:14px; background:#0c0c0e; border:1px solid var(--card-line); border-radius:10px; padding:14px 8px; }
  .figures svg{ width:42%; max-width:145px; height:auto; }
  .fig-cap{ text-align:center; font-size:9px; letter-spacing:0.06em; text-transform:uppercase; color:var(--dim); margin-top:4px; }
  .fig-col{ display:flex; flex-direction:column; align-items:center; flex:1; }
  .body-base{ fill:#232327; stroke:#38383e; stroke-width:1.4; }
  .m-detail{ fill:none; stroke:#38383e; stroke-width:1.2; }
  .region-primary{ fill:var(--accent) !important; }
  .region-secondary{ fill:var(--accent-secondary) !important; }
  .region-idle{ fill:#2d2d32 !important; }
  .muscle-key{ font-size:12px; margin-bottom:4px; }
  .muscle-key b{ color:var(--ink); }
  .key-row{ display:flex; align-items:center; gap:6px; margin-bottom:6px; }
  .dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }

  .exec-seq{ display:flex; gap:10px; margin-bottom:14px; }
  .exec-seq .exec-panel{ flex:1 1 100%; padding:20px 10px 10px; }
  .exec-panel{
    flex:1; background:#0c0c0e; border:1px solid var(--card-line);
    border-radius:10px; padding:18px 6px 8px; position:relative;
  }
  .exec-panel svg{ width:100%; height:auto; }
  .exec-num{
    position:absolute; top:7px; left:7px;
    width:18px; height:18px; border-radius:50%;
    background:#2a2a2e; color:var(--ink);
    font-size:10px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }
  .exec-cap{ text-align:center; font-size:9px; letter-spacing:0.06em; text-transform:uppercase; color:var(--dim); margin-top:8px; }
  .fig-line{ fill:none; stroke:#d8d8dc; stroke-width:3.4; stroke-linecap:round; stroke-linejoin:round; }
  .fig-fill{ fill:#d8d8dc; }
  .machine-line{ fill:none; stroke:#5c5c63; stroke-width:2.4; stroke-linecap:round; }
  .path-indicator{ fill:none; stroke:var(--accent); stroke-width:2; stroke-dasharray:4 3; }
  .m-outline{ fill:none; stroke:#5c5c63; stroke-width:2.2; }
  .m-outline-thin{ fill:none; stroke:#5c5c63; stroke-width:1.4; }
  .plate{ fill:#33333a; stroke:#5c5c63; stroke-width:1.4; }
  .grip{ fill:var(--accent); }
  .ghost{ fill:none; stroke:#4a4a51; stroke-width:1.6; stroke-dasharray:3 3; }
  .grip-line{ stroke:var(--accent); }
  .m-active{ fill:var(--accent); }
  .m-idle{ fill:#3a3a40; }
  .motion-arrow{ stroke:#6a6a70; stroke-width:1.4; fill:none; }

  .history-list{ }
  .notes-list{ display:flex; flex-direction:column; gap:10px; }
  .note-block{ font-size:12.5px; color:var(--dim); line-height:1.5; }
  .note-block b{ color:var(--ink); display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px; }
  .note-block ul{ margin:0; padding-left:18px; }
  .note-block li{ margin-bottom:4px; }
  .history-row{ position:relative; overflow:hidden; }
  .history-delete-bg{
    position:absolute; top:0; right:0; bottom:0; width:76px;
    background:var(--accent); color:#fff; font-size:12px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }
  .history-item{
    display:flex; align-items:center; gap:8px; padding:9px 0;
    border-bottom:1px solid var(--card-line); font-size:12.5px; color:var(--dim);
    background:var(--card); position:relative;
  }
  .history-text{ flex:1; min-width:0; display:flex; justify-content:space-between; gap:8px; }
  .history-item b{ color:var(--ink); }
  .del-history{ flex-shrink:0; color:var(--dim); background:none; border:none; font-size:16px; padding:2px 4px; }
  .empty{ font-size:12.5px; color:var(--dim); text-align:center; padding:14px 0; }
</style>
</head>
<body>

<!-- HUB VIEW -->
<div id="hubView">
  <header>
    <div class="eyebrow">TrainMore, 1e Middellandstraat</div>
    <h1>Session Map</h1>
  </header>
  <div class="day-toggle">
    <button class="day-btn active" id="dayBtnA" onclick="setDay('A')">Full Body A</button>
    <button class="day-btn" id="dayBtnB" onclick="setDay('B')">Full Body B</button>
  </div>
  <div class="list" id="exerciseList"></div>
  <div class="section-head">
    <h2>Optional add-ins</h2>
    <p>Not tied to a day, drop these into either session when you have the time.</p>
  </div>
  <div class="list" id="optionalList"></div>
</div>

<!-- DETAIL VIEW -->
<div id="detailView">
  <div class="detail-head">
    <button class="back-btn" onclick="goHub()">&larr;</button>
    <div class="detail-title">
      <div class="ex-name" id="detailName"></div>
      <div class="ex-equip" id="detailEquip"></div>
    </div>
    <button class="info-btn" onclick="openModal()">i</button>
  </div>

  <div class="sets-card">
    <div id="setsList"></div>
    <button class="add-set" onclick="addSet()">+ Add set</button>
  </div>
  <button class="save-btn" onclick="saveWorkout()">Save this session</button>
  <div class="save-confirm" id="saveConfirm"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle-zone">
      <div class="modal-handle"></div>
    </div>
    <div class="modal-head">
      <h2 id="modalName"></h2>
      <button class="close-btn" onclick="closeModal()">&times;</button>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="execution" onclick="switchTab('execution')">Execution</div>
      <div class="tab" data-tab="muscles" onclick="switchTab('muscles')">Muscle groups</div>
      <div class="tab" data-tab="notes" onclick="switchTab('notes')">Notes</div>
      <div class="tab" data-tab="history" onclick="switchTab('history')">History</div>
    </div>
    <div class="tab-body" id="tabBody">
      <div class="tab-panel active" data-panel="execution">
        <div class="exec-seq" id="movementSvg"></div>
        <p id="cueText"></p>
      </div>
      <div class="tab-panel" data-panel="muscles">
        <div class="figures" id="figuresWrap"></div>
        <div class="muscle-key" id="muscleKey"></div>
      </div>
      <div class="tab-panel" data-panel="notes">
        <div class="notes-list" id="notesList"></div>
      </div>
      <div class="tab-panel" data-panel="history">
        <div class="history-list" id="modalHistory"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ---------- DATA ---------- */

const REGION_LABELS = {
  chest:'Chest', frontDelt:'Front delts', biceps:'Biceps', abs:'Core',
  quads:'Quads', lats:'Lats', upperBack:'Upper back', rearDelt:'Rear delts',
  triceps:'Triceps', glutes:'Glutes', hamstrings:'Hamstrings', calves:'Calves'
};

const EXERCISES = [
  { id:'chestPress', day:'A', name:'Chest Press', equip:'Smith machine or flat bench and barbell',
    cue:"Press straight up, don't flare elbows past 75 degrees. Full stretch at the bottom.",
    muscles:{primary:['chest'], secondary:['frontDelt','triceps']},
    notes:{mistakes:["Elbows drifting above shoulder height shifts the work onto the front of your shoulder instead of your chest","Locking your elbows fully at the top dumps tension off the chest right when it should peak","Lower back arching off the pad to grind out a rep means the weight is too heavy for now"], angles:["Flat or neutral emphasizes the middle of your chest, this is your default","An incline around 30 degrees shifts emphasis to the upper chest. Steeper than that starts working the front delt more than the chest","Handles should line up with mid-chest when seated normally, not up near your collarbone"]},
    movement:'chestPress', defaultSets:[{reps:10,weight:20},{reps:10,weight:20},{reps:10,weight:20},{reps:10,weight:20}] },

  { id:'assistedPullUp', day:'A', name:'Assisted Pull-Up', equip:'Assisted pull-up and dip machine',
    cue:"Set assistance so the last 2 reps feel hard, not impossible. Pull your chest to the bar, lead with the elbows down and back.",
    muscles:{primary:['lats'], secondary:['upperBack','biceps','rearDelt']},
    notes:{mistakes:["Shrugging your shoulders up toward your ears takes tension off your lats and puts it on your traps","Using momentum or bouncing at the bottom instead of a controlled dead hang start","Grip too wide feels stronger but shortens your range of motion, closer to shoulder width usually works better"], angles:["More assistance weight on the stack means less of your bodyweight you're lifting, this machine's numbers work in reverse from most others","If your gym's machine has a chin-up handle option (palms facing you), that shifts more work onto biceps, useful for variety later"]},
    movement:'assistedPullUp', defaultSets:[{reps:8,weight:20},{reps:8,weight:20},{reps:8,weight:20}] },

  { id:'singleArmRow', day:'A', name:'Single-Arm Cable Row', equip:'Cable crossover station, low pulley',
    cue:"Pull elbow past your ribcage, squeeze the shoulder blade. Left arm does its full set before the right starts.",
    muscles:{primary:['lats','upperBack'], secondary:['biceps']},
    notes:{mistakes:["Rotating your torso to help pull the weight, the power should come from your back, not a twist","Shrugging the shoulder up instead of driving the elbow back and down","Leaning too far back at the finish, a slight lean is fine but this shouldn't turn into a full-body swing"], angles:["Low pulley pulls at a slight upward angle into your torso, good general setup for lats","A slightly higher pulley setting shifts emphasis a bit more toward the upper back and rear delt"]},
    movement:'row', defaultSets:[{reps:11,weight:15},{reps:11,weight:15},{reps:11,weight:15},{reps:11,weight:15}] },

  { id:'shoulderPress', day:'A', name:'Single-Arm Shoulder Press', equip:'Dumbbell, seated on adjustable bench',
    cue:"Press straight overhead, don't let your torso lean to help. If it leans, the weight is too heavy.",
    muscles:{primary:['frontDelt'], secondary:['triceps']},
    notes:{mistakes:["Torso leaning to help push the weight up, if it leans, the weight is too heavy, not a stronger rep","Pressing the dumbbell forward instead of straight up puts extra stress on the shoulder joint","Not locking out fully at the top loses part of the range you're paying for"], angles:["Bench upright at 90 degrees is standard for this. Reclining it slightly shifts more work onto the upper chest and away from the shoulder, not what you want here"]},
    movement:'shoulderPress', defaultSets:[{reps:11,weight:10},{reps:11,weight:10},{reps:11,weight:10}] },

  { id:'legPress', day:'A', name:'Leg Press', equip:'Leg press machine',
    cue:"Kept light on purpose, skating already loads your legs. This is maintenance, not a max effort lift.",
    muscles:{primary:['quads'], secondary:['glutes','hamstrings']},
    notes:{mistakes:["Lower back rounding off the pad at the bottom, a sign you've gone deeper than your hips can control safely","Locking your knees out fully at the top puts the stress on the joint instead of the muscle","Feet too low on the platform overloads the knees, too high overloads the lower back"], angles:["Feet placed higher and wider on the platform shifts more work to glutes and hamstrings","Feet placed lower and closer together shifts more work to the quads, which is the setup you want given your goal here"]},
    movement:'legPress', defaultSets:[{reps:13,weight:60},{reps:13,weight:60}] },

  { id:'rotatorCuff', day:'A', name:'Band Rotator Cuff and Core Finisher', equip:'Light resistance band, floor mat',
    cue:"External rotation with elbow pinned to your side, then a plank or dead bug set. Left arm's band work first.",
    muscles:{primary:['rearDelt'], secondary:['abs']},
    notes:{mistakes:["Using a band heavy enough that your shoulder shrugs or your elbow drifts away from your ribs, this should feel light","Rotating from the shoulder joint too far, the elbow stays pinned, only the forearm rotates","Rushing through it, this is a small stabilizing muscle group, slow and controlled is the whole point"], angles:["Anchor point at roughly elbow height keeps the resistance in the right plane for this movement"]},
    movement:'rotatorCuff', defaultSets:[{reps:15,weight:0},{reps:15,weight:0}] },

  { id:'assistedDip', day:'B', name:'Assisted Dip', equip:'Assisted pull-up and dip machine',
    cue:"Lean forward slightly to bias chest over triceps. Lower until your shoulders dip below your elbows, press back up.",
    muscles:{primary:['chest','triceps'], secondary:['frontDelt']},
    notes:{mistakes:["Staying too upright shifts the work almost entirely onto triceps, missing the chest emphasis you want","Lowering too fast or too deep can strain the front of the shoulder, control the descent","Flaring elbows out wide instead of keeping them tucked toward your body puts more stress on the shoulder joint"], angles:["Leaning your torso forward biases chest over triceps, which is what you're after here","Staying upright with elbows tucked close shifts the same movement toward triceps instead, useful to know if you ever want a triceps-focused variation"]},
    movement:'dip', defaultSets:[{reps:9,weight:25},{reps:9,weight:25},{reps:9,weight:25}] },

  { id:'pecFly', day:'A', name:'Pec Fly', equip:'Pec deck machine',
    cue:"Slight bend in elbow throughout, think about hugging a tree. Slow on the way back.",
    muscles:{primary:['chest'], secondary:['frontDelt']},
    notes:{mistakes:["This is the most common failure point on this machine, if you only feel your shoulders, it's almost always the seat height, not something you're doing wrong technique-wise","Letting your elbows travel behind your torso at the bottom overstretches the front of the shoulder joint","Using momentum to slam the pads together instead of a slow, controlled squeeze"], angles:["The parallel rule: seated normally with handles gripped, your upper arms should be parallel to the floor, elbows roughly level with your shoulders, not above or below","If elbows sit above your shoulders the seat is too low, if they sit below it's too high, this machine has one correct position rather than several angle options"]},
    movement:'pecFly', defaultSets:[{reps:13,weight:15},{reps:13,weight:15},{reps:13,weight:15}] },

  { id:'cableCrossover', day:'B', name:'Single-Arm Cable Crossover', equip:'Cable tower, high pulley, single handle',
    cue:"Pulley set high. Twist slightly away from the machine, then punch the handle diagonally across your body toward your opposite hip, slight bend in the elbow, squeeze your chest hard at the bottom. Left arm goes first.",
    muscles:{primary:['chest'], secondary:['frontDelt']},
    notes:{mistakes:["Losing the slight elbow bend and turning it into a straight-arm swing shifts stress onto the elbow joint instead of the chest","Rotating your torso too far, the power comes from the chest squeezing, not from spinning your hips","Standing too close to the machine means not enough tension at the starting stretch"], angles:["Pulley high, pulling down and across to your opposite hip (your current setup) emphasizes the lower chest","Pulley low, pulling up and across toward the opposite shoulder emphasizes the upper chest instead","Pulley at shoulder height, pulling straight across, hits the middle of the chest, the most neutral version. Worth alternating pulley height by session for more complete development over time"]},
    movement:'cableCrossover', defaultSets:[{reps:12,weight:7.5},{reps:12,weight:7.5},{reps:12,weight:7.5}] },

  { id:'latPulldown', day:'B', name:'Lat Pulldown', equip:'Cable tower, wide bar attachment, seated',
    cue:"Pull the bar to your upper chest, elbows driving down and slightly back. Chest stays up, don't lean back to muscle it down.",
    muscles:{primary:['lats'], secondary:['upperBack','biceps']},
    notes:{mistakes:["Leaning back and using body momentum to muscle the bar down instead of pulling with your back","Pulling the bar behind your neck instead of to your upper chest, this puts unnecessary strain on the shoulder","Grip too narrow shifts more work onto biceps and away from lats"], angles:["Wide overhand grip biases the lats through a broad range","A narrower or reverse grip shifts more emphasis onto the lower lats and biceps, a useful variation later on"]},
    movement:'latPulldown', defaultSets:[{reps:11,weight:35},{reps:11,weight:35},{reps:11,weight:35}] },

  { id:'facePull', day:'B', name:'Face Pull', equip:'Cable crossover, rope attachment, chest height',
    cue:"Pull the rope to your forehead, elbows finish high and wide. Good counterbalance to a chest heavy session.",
    muscles:{primary:['rearDelt','upperBack'], secondary:[]},
    notes:{mistakes:["Pulling with the arms alone instead of driving the elbows back and high, this should feel like squeezing your shoulder blades together","Letting the elbows drop below shoulder height turns this into more of a row than a face pull","Using too much weight, which forces you to lean back and lose the posture-correcting purpose of the exercise"], angles:["Pulley set at roughly eye or forehead height keeps the pulling angle correct for rear delts and upper back"]},
    movement:'facePull', defaultSets:[{reps:15,weight:10},{reps:15,weight:10}] },

  { id:'bulgarianSplitSquat', day:'B', name:'Bulgarian Split Squat', equip:'Flat bench, pair of dumbbells',
    cue:"Rear foot laces down on the bench, front knee tracks over the toes. Skating already asks a lot of one stance, this evens it out.",
    muscles:{primary:['quads','glutes'], secondary:['hamstrings']},
    notes:{mistakes:["Front knee caving inward instead of tracking over your toes, a common early wobble as you learn the balance","Rear foot too close to the front foot cramps your range, give yourself a longer stride than feels natural at first","Leaning too far forward shifts the work toward the knee instead of the glute"], angles:["A more upright torso emphasizes the quad more","Leaning the torso forward slightly shifts more emphasis onto the glute, worth trying both once the balance feels solid"]},
    movement:'splitSquat', defaultSets:[{reps:9,weight:10},{reps:9,weight:10},{reps:9,weight:10}] },

let currentDay = 'A';

let sets = [];

/* ---------- STORAGE ---------- */

function loadHistory(){
  try{
    const raw = localStorage.getItem('workout-history');
    history = raw ? JSON.parse(raw) : {};
  }catch(e){ history = {}; }
}

function persistHistory(){
  try{
    localStorage.setItem('workout-history', JSON.stringify(history));
  }catch(e){ console.error('save failed', e); }
}

/* ---------- HUB RENDER ---------- */

function setDay(day){
  currentDay = day;
  document.getElementById('dayBtnA').classList.toggle('active', day==='A');
  document.getElementById('dayBtnB').classList.toggle('active', day==='B');
  renderHub();
}

function cardHtml(e){
  const h = history[e.id] || [];
  const last = h[0];
  let lastPill = '';
  if(last){
    const top = last.sets.reduce((a,b)=> b.weight > a.weight ? b : a, last.sets[0]);
    lastPill = top.weight > 0 ? `<span class="pill last">Last ${top.weight}kg</span>` : `<span class="pill last">Logged</span>`;
  }
  return `
    <div class="ex-card" onclick="openDetail('${e.id}')">
      <div class="thumb">${miniIcon(e)}</div>
      <div class="ex-info">
        <div class="ex-name">${e.name}</div>
        <div class="ex-equip">${e.equip}</div>
        <div class="ex-badges">
          <span class="pill">${e.defaultSets.length} sets</span>
          ${lastPill}
        </div>
      </div>
      <div class="chevron">&rsaquo;</div>
    </div>`;
}

function renderHub(){
  const list = document.getElementById('exerciseList');
  const items = EXERCISES.filter(e => (e.day === currentDay || e.day === 'both') && !e.optional);
  list.innerHTML = items.map(cardHtml).join('');

  const optList = document.getElementById('optionalList');
  const optItems = EXERCISES.filter(e => e.optional);
  optList.innerHTML = optItems.map(cardHtml).join('');
}

/* ---------- DETAIL VIEW ---------- */

function openDetail(id){
  currentExerciseId = id;
  const e = EXERCISES.find(x => x.id === id);
  const h = history[id] || [];
  sets = h[0] ? JSON.parse(JSON.stringify(h[0].sets)) : JSON.parse(JSON.stringify(e.defaultSets));

  document.getElementById('detailName').textContent = e.name;
  document.getElementById('detailEquip').textContent = e.equip;
  document.getElementById('modalName').textContent = e.name;
  document.getElementById('cueText').textContent = e.cue;
  document.getElementById('saveConfirm').textContent = '';

  renderSets();
  renderMovement(e.movement);
  renderMuscles(e.muscles);
  renderModalHistory(id);
  renderNotes(e.notes);

  document.getElementById('hubView').style.display = 'none';
  document.getElementById('detailView').style.display = 'block';
  window.scrollTo(0,0);
}

function goHub(){
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('hubView').style.display = 'block';
  renderHub();
}

function renderSets(){
  const isTimeBased = sets.every(s => s.weight === 0) && currentExerciseId === 'plank';
  const list = document.getElementById('setsList');
  list.innerHTML = sets.map((s,i) => `
    <div class="set-row">
      <div class="set-num">${i+1}</div>
      <div class="field-group">
        <div class="field-label">${isTimeBased ? 'Seconds' : 'Reps'}</div>
        <div class="field">
          <button class="stepper-btn" onclick="adjust(${i},'reps',-1)">-</button>
          <input type="number" inputmode="numeric" value="${s.reps}" onchange="setVal(${i},'reps',this.value)">
          <button class="stepper-btn" onclick="adjust(${i},'reps',1)">+</button>
        </div>
      </div>
      ${!isTimeBased ? `
      <div class="field-group">
        <div class="field-label">Weight, kg</div>
        <div class="field">
          <button class="stepper-btn" onclick="adjust(${i},'weight',-2.5)">-</button>
          <input type="number" inputmode="decimal" value="${s.weight}" onchange="setVal(${i},'weight',this.value)">
          <button class="stepper-btn" onclick="adjust(${i},'weight',2.5)">+</button>
        </div>
      </div>` : ''}
      <button class="del-set" onclick="removeSet(${i})">&times;</button>
    </div>
  `).join('');
}

function adjust(i, field, delta){
  sets[i][field] = Math.max(0, sets[i][field] + delta);
  renderSets();
}
function setVal(i, field, val){
  sets[i][field] = parseFloat(val) || 0;
  renderSets();
}
function addSet(){
  const last = sets[sets.length-1] || {reps:10, weight:10};
  sets.push({reps:last.reps, weight:last.weight});
  renderSets();
}
function removeSet(i){
  if(sets.length <= 1) return;
  sets.splice(i,1);
  renderSets();
}

async function saveWorkout(){
  const entry = { date: new Date().toISOString(), sets: JSON.parse(JSON.stringify(sets)) };
  if(!history[currentExerciseId]) history[currentExerciseId] = [];
  history[currentExerciseId].unshift(entry);
  await persistHistory();
  renderModalHistory(currentExerciseId);
  const conf = document.getElementById('saveConfirm');
  conf.textContent = 'Saved, this stays in your history from now on.';
  setTimeout(()=>{ conf.textContent=''; }, 2500);
}

/* ---------- MODAL ---------- */

function openModal(){ document.getElementById('overlay').classList.add('open'); }
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===name));

  const body = document.getElementById('tabBody');
  const startHeight = body.offsetHeight;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.panel===name));
  const endHeight = document.querySelector('.tab-panel.active').offsetHeight;

  body.style.height = startHeight + 'px';
  body.offsetHeight; // force reflow so the browser registers the start height
  requestAnimationFrame(() => { body.style.height = endHeight + 'px'; });

  body.addEventListener('transitionend', function onDone(e){
    if(e.propertyName !== 'height') return;
    body.style.height = 'auto';
    body.removeEventListener('transitionend', onDone);
  });
}

/* ---------- SWIPE DOWN TO CLOSE MODAL ---------- */

(function setupSwipeToClose(){
  const modal = document.querySelector('.modal');
  const handle = document.querySelector('.modal-handle-zone');
  let startY = 0, dy = 0, dragging = false;

  function onStart(e){
    dragging = true;
    startY = e.touches[0].clientY;
    modal.style.transition = 'none';
  }
  function onMove(e){
    if(!dragging) return;
    dy = Math.max(0, e.touches[0].clientY - startY);
    modal.style.transform = `translateY(${dy}px)`;
  }
  function onEnd(){
    if(!dragging) return;
    dragging = false;
    modal.style.transition = 'transform .22s ease';
    if(dy > 110){
      modal.style.transform = 'translateY(100%)';
      setTimeout(() => {
        closeModal();
        modal.style.transition = 'none';
        modal.style.transform = '';
      }, 200);
    } else {
      modal.style.transform = '';
    }
    dy = 0;
  }

  handle.addEventListener('touchstart', onStart, {passive:true});
  handle.addEventListener('touchmove', onMove, {passive:true});
  handle.addEventListener('touchend', onEnd);
})();

function renderModalHistory(id){
  const h = history[id] || [];
  const wrap = document.getElementById('modalHistory');
  if(h.length === 0){ wrap.innerHTML = '<div class="empty">No sessions logged yet for this exercise.</div>'; return; }
  wrap.innerHTML = h.map((entry, i) => {
    const d = new Date(entry.date);
    const dateStr = d.toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'});
    const summary = entry.sets.map(s => s.weight > 0 ? `${s.weight}kg x ${s.reps}` : `${s.reps}s`).join(', ');
    return `<div class="history-row">
      <div class="history-delete-bg" onclick="deleteHistoryEntry('${id}', ${i}, true)">Delete</div>
      <div class="history-item">
        <div class="history-text"><span>${dateStr}</span><b style="text-align:right; max-width:60%;">${summary}</b></div>
        <button class="del-history" onclick="deleteHistoryEntry('${id}', ${i})">&times;</button>
      </div>
    </div>`;
  }).join('');
  wrap.querySelectorAll('.history-row').forEach(row => attachSwipeToDelete(row));
}

async function deleteHistoryEntry(id, index, skipConfirm){
  if(!skipConfirm && !confirm('Delete this logged session? This can\'t be undone.')) return;
  history[id].splice(index, 1);
  await persistHistory();
  renderModalHistory(id);
}

/* ---------- SWIPE TO DELETE (history rows) ---------- */

function attachSwipeToDelete(row){
  const item = row.querySelector('.history-item');
  const maxSwipe = -76;
  let startX = 0, startY = 0, dx = 0, locked = null;

  function onStart(e){
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY; dx = 0; locked = null;
    item.style.transition = 'none';
  }
  function onMove(e){
    const t = e.touches[0];
    const rawDx = t.clientX - startX;
    const rawDy = t.clientY - startY;
    if(locked === null){
      if(Math.abs(rawDx) > 6 || Math.abs(rawDy) > 6){
        locked = Math.abs(rawDx) > Math.abs(rawDy) ? 'x' : 'y';
      }
    }
    if(locked !== 'x') return;
    e.preventDefault();
    dx = Math.max(maxSwipe, Math.min(0, rawDx));
    item.style.transform = `translateX(${dx}px)`;
  }
  function onEnd(){
    if(locked === 'x'){
      item.style.transition = 'transform .2s ease';
      item.style.transform = dx < maxSwipe / 2 ? `translateX(${maxSwipe}px)` : 'translateX(0)';
    }
    locked = null; dx = 0;
  }

  item.addEventListener('touchstart', onStart, {passive:true});
  item.addEventListener('touchmove', onMove, {passive:false});
  item.addEventListener('touchend', onEnd);
}

function renderNotes(notes){
  const wrap = document.getElementById('notesList');
  if(!notes){ wrap.innerHTML = '<div class="empty">No notes for this one yet.</div>'; return; }
  const mistakesHtml = notes.mistakes && notes.mistakes.length
    ? `<div class="note-block"><b>Watch for</b><ul>${notes.mistakes.map(m=>`<li>${m}</li>`).join('')}</ul></div>` : '';
  const anglesHtml = notes.angles && notes.angles.length
    ? `<div class="note-block"><b>Seat and angle effects</b><ul>${notes.angles.map(a=>`<li>${a}</li>`).join('')}</ul></div>` : '';
  wrap.innerHTML = mistakesHtml + anglesHtml || '<div class="empty">No notes for this one yet.</div>';
}
